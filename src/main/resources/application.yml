spring:
  application:
    name: wex-purchase-service
  datasource:
    url: jdbc:h2:mem:purchases;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

treasury:
  api:
    base-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange
  retry:
    max-attempts: 3
    initial-delay-ms: 500
    multiplier: 2.0
  cache:
    maximum-size: 5000
    expire-after-write-hours: 1
    refresh-after-write-minutes: 15

server:
  port: 8080

logging:
  config: classpath:log4j2-spring.xml
  level:
    com.wex.purchase: info
    org.springframework.web: warn
