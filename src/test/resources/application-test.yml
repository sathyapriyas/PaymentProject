spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
  jpa:
    hibernate:
      ddl-auto: create-drop

treasury:
  api:
    base-url: http://localhost:9999/mock
  retry:
    max-attempts: 2
    initial-delay-ms: 10
    multiplier: 1.0
  cache:
    maximum-size: 5000
    expire-after-write-hours: 1
    refresh-after-write-minutes: 15
